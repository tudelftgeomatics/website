---
layout: default
---

<main class="container">
  <nav aria-label="Breadcrumb" style="margin-top: var(--space-4)">
    <ol class="unstyled hstack" style="font-size: var(--text-7)">
      <li><a href="{{ site.baseurl }}/" class="unstyled">Home</a></li>
      <li aria-hidden="true">/</li>
      <li>
        <a href="{{ page.url }}" class="unstyled" aria-current="page"
          ><strong>{{ page.title }}</strong></a
        >
      </li>
    </ol>
  </nav>

  <h1>{{ page.title }}</h1>
  <article style="max-width: 72ch; margin-top: var(--space-5)">
    {{ content }}
  </article>
</main>
