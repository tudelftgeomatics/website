<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MSc Geomatics for the Built Environment at TU Delft —- Information hub for current and prospective students."
    />
    <title>
      {{ page.title | default: "MSc Geomatics for the Built Environment" }} · TU
      Delft
    </title>
    <link rel="icon" href="{{ site.baseurl }}/img/bk-voxels.png" />
    <link rel="stylesheet" href="{{ site.baseurl }}/css/oat.min.css" />
    <script src="{{ site.baseurl }}/js/oat.min.js" defer></script>
    <style>
      :root {
        color-scheme: light;
        --primary: #934e51;
        --primary-foreground: #ffffff;
        --ring: #934e51;
        --accent: #e5f6fb;
        --secondary: #e9f6fb;
        --secondary-foreground: #006b85;
      }
      .home-header {
        text-align: center;
        padding: var(--space-7) 0 var(--space-5);
      }
      .home-header img {
        height: 150px;
        width: auto;
        display: block;
        margin: 0 auto;
      }
      .home-header .tagline {
        color: var(--muted-foreground);
        margin-top: var(--space-4);
        font-size: var(--text-5);
      }
      footer.site-footer {
        border-top: 1px solid var(--border);
        padding: var(--space-5);
        text-align: center;
        color: var(--muted-foreground);
        font-size: var(--text-7);
        margin-top: var(--space-7);
      }
      footer.site-footer a {
        color: var(--muted-foreground);
      }
      #home-content a {
        color: var(--primary);
        font-weight: 600;
        text-decoration: none;
      }
      #home-content a:hover {
        text-decoration: underline;
      }
      #home-content .col-4:first-child .card td:first-child {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: nowrap;
      }
      #home-content .col-4:first-child .card td:first-child a {
        font-weight: 400;
      }
      #home-content .card {
        border: none;
        background: #fbf5f5;
      }
    </style>
  </head>

  <body>
    {{ content }}
  </body>
</html>
